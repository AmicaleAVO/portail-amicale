<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Portail Amicale</title>
  <link rel="stylesheet" href="../../CSS/style.css">
  <style>
    :root {
      --primary:   #E07B39;
      --primary-d: #C4622A;
      --accent:    #4A8C5C;
      --accent-d:  #3A7049;
      --bg:        #F7F4F0;
      --card-bg:   #FFFFFF;
      --text:      #2D2D2D;
      --muted:     #7A7A7A;
      --border:    #E2DBD2;
      --radius:    12px;
      --shadow:    0 6px 24px rgba(0,0,0,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 16px 48px;
    }

    .form-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 32px 28px;
      width: 100%;
      max-width: 400px;
      margin-top: 32px;
      position: relative;
      z-index: 1;
    }

    .form-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 24px;
      color: var(--text);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }
    .field label {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--muted);
    }
    .field input {
      padding: 11px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      color: var(--text);
      background: var(--bg);
      transition: border-color .2s, background .2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
    .field input.invalid { border-color: #c0392b; background: #fff8f8; }

    .error-box {
      background: rgba(192,57,43,.08);
      border: 1px solid rgba(192,57,43,.25);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: .85rem;
      color: #c0392b;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-box.show { display: flex; }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 13px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 3px 10px rgba(224,123,57,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover { background: var(--primary-d); transform: translateY(-1px); }
    .btn-submit:active { transform: scale(.97); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .register-link {
      text-align: center;
      margin-top: 20px;
      font-size: .85rem;
      color: var(--muted);
    }
    .register-link a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }
    .register-link a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: .78rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <img src="../../Images/logo.png" alt="Logo Amicale" class="header-logo" onerror="this.style.display='none'">
    <div class="header-title">
      <div class="title-main">Portail Amicale</div>
      <div class="title-sub">Connexion au portail</div>
    </div>
  </header>

  <div class="content-wrapper">
    <div class="form-card">

      <h2>Identifiez-vous</h2>

      <div class="error-box" id="error-box">
        <span>⚠️</span>
        <span id="error-msg"></span>
      </div>

      <form id="login-form" novalidate>

        <div class="field">
          <label for="mail">Adresse email</label>
          <input type="email" id="mail" placeholder="jean@exemple.fr" required autocomplete="email">
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn-submit" id="btn-submit">
          <div class="spinner" id="spinner"></div>
          <span id="btn-label">Se connecter</span>
        </button>

      </form>

      <div class="register-link">
        Pas encore de compte ? <a href="demande_acces.html">Demander un accès</a><br>
        Demande approuvée ? <a href="register.html">Activer mon compte</a>
        <br><a href="mot_de_passe_oublie.html">Mot de passe oublié ?</a>
      </div>

    </div>
  </div>

  <footer>
    &copy; 2026 Amicale des Sapeurs-Pompiers de Saint-Avold — Contact | Mentions légales
  </footer>

  <script src="../../js/supabase.js"></script>
  <script>
    if (getSession()) {
      window.location.href = '../accueil.html';
    }
    if (sessionStorage.getItem('reset_success')) {
    sessionStorage.removeItem('reset_success');
    // Réutilise la error-box en vert pour afficher le succès
    const box = document.getElementById('error-box');
    box.style.background = 'rgba(74,140,92,.08)';
    box.style.borderColor = 'rgba(74,140,92,.25)';
    box.style.color = '#3A7049';
    document.getElementById('error-msg').textContent = 'Mot de passe modifié avec succès. Connectez-vous.';
    box.classList.add('show');
    }

    const form      = document.getElementById('login-form');
    const errorBox  = document.getElementById('error-box');
    const errorMsg  = document.getElementById('error-msg');
    const btnSubmit = document.getElementById('btn-submit');
    const btnLabel  = document.getElementById('btn-label');
    const spinner   = document.getElementById('spinner');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorBox.classList.add('show');
    }
    function hideError() {
      errorBox.classList.remove('show');
    }
    function setLoading(loading) {
      btnSubmit.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnLabel.textContent = loading ? 'Connexion...' : 'Se connecter';
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      hideError();

      const mail     = document.getElementById('mail').value.trim();
      const password = document.getElementById('password').value;

      if (!mail || !password) {
        showError('Veuillez remplir tous les champs.');
        return;
      }

      setLoading(true);

      try {
        const user = await login(mail, password);
        window.location.href = '../accueil.html';
      } catch (err) {
        showError(err.message || 'Erreur de connexion. Réessayez.');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
